<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能树编辑器 V4.0 - 完整版</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1e1e2f; color: #eee; }
        #toolbar {
            position: fixed; top: 10px; left: 10px; right: 10px;
            background: #2a2e3a; padding: 8px 16px; border-radius: 12px;
            display: flex; gap: 12px; flex-wrap: wrap; z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5); align-items: center;
            max-height: 120px; overflow-y: auto;
        }
        #toolbar button, #toolbar label.file-label {
            background: #3a3f4a; border: none; color: white; padding: 4px 12px;
            border-radius: 20px; cursor: pointer; font-size: 13px;
            display: inline-block; white-space: nowrap;
        }
        #toolbar button.active { background: #f0b27a; color: #1e1e2f; }
        #toolbar button:hover, #toolbar label.file-label:hover { background: #5a6f8a; }
        .separator { width: 1px; background: #5a6f8a; margin: 0 6px; }
        .style-panel {
            background: #1a1e2a; padding: 4px 10px; border-radius: 28px;
            display: inline-flex; gap: 8px; align-items: center; flex-wrap: wrap;
        }
        input[type="color"] { width: 28px; height: 22px; border: none; border-radius: 4px; cursor: pointer; }
        input[type="range"] { width: 70px; }
        #status { margin-left: auto; font-size: 12px; background: #1e1e2f; padding: 4px 12px; border-radius: 20px; }
        #canvas-container {
            position: absolute; top: 80px; left: 0; right: 0; bottom: 0;
            background: #0f121a; overflow: hidden; cursor: grab;
        }
        canvas { display: block; background: #0f121a; }
        .info-panel {
            position: fixed; bottom: 16px; right: 16px;
            background: #1e1e2fcc; backdrop-filter: blur(4px);
            padding: 6px 12px; border-radius: 20px; font-size: 12px;
            pointer-events: none; z-index: 100;
        }
        .node-editor {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #2a2e3a; border-radius: 16px; padding: 16px;
            width: 400px; max-height: 80vh; overflow-y: auto;
            z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .node-editor h3 { margin: 0 0 10px 0; }
        .node-editor label { display: block; margin-top: 8px; font-size: 13px; }
        .node-editor input, .node-editor select { width: 100%; padding: 6px; margin-top: 4px; border-radius: 8px; border: none; background: #3a3f4a; color: #eee; }
        .node-editor .row { display: flex; gap: 8px; }
        .node-editor .row > * { flex: 1; }
        .node-editor .btn-group { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
        .node-editor .btn-group button { padding: 4px 16px; }
        .node-editor .hint { font-size: 11px; color: #888; margin-top: 4px; }
    </style>
</head>
<body>
<div id="toolbar">
    <button id="btn-add-token">➕ 添加万能Token</button>
    <div class="separator"></div>
    <button id="btn-pan" class="active">🖱️ 平移</button>
    <button id="btn-link">🔗 连线模式</button>
    <button id="btn-zoom-in">➕</button>
    <button id="btn-zoom-out">➖</button>
    <button id="btn-clear-edges">🗑️ 清连线</button>
    <button id="btn-reset-nodes">🔄 重置位置</button>
    <div class="separator"></div>
    <label class="file-label" id="load-skills-label">📂 skill.json</label>
    <label class="file-label" id="load-layout-label">📂 布局</label>
    <button id="btn-save">💾 保存布局</button>
    <button id="btn-reset-view">🖥️ 重置视图</button>
    <div id="status">就绪</div>
</div>
<div id="canvas-container">
    <canvas id="editorCanvas"></canvas>
</div>
<div class="info-panel">
    💡 拖拽空白平移；滚轮缩放；连线模式点击两个节点连线；<br>
    🖱️ **Ctrl+左键** 多选节点；双击节点编辑属性。<br>
    🔗 连线只记录起点和终点。<br>
    📌 **分支节点**需指定所属主动技能和分支ID。
</div>

<script>
    (function() {
        // ---------- DOM ----------
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        const statusEl = document.getElementById('status');

        // ---------- 数据 ----------
        let nodes = [];
        let edges = [];
        let selectedNodes = [];
        let nextId = 100;
        let skillsMap = new Map();          // skillKey -> skill data
        let activeSkills = [];              // 仅主动技能列表 { key, name, icon }

        let view = { x: 0, y: 0, zoom: 1 };
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragNode = null;
        let dragNodeOffset = { x: 0, y: 0 };
        let currentMode = 'pan';
        let linkSelectedNode = null;
        let ctrlPressed = false;

        // ---------- 图标缓存 ----------
        let iconCache = new Map();
        let borderCache = new Map();

        // ---------- 加载技能数据 ----------
        function loadSkills(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    skillsMap.clear();
                    activeSkills = [];
                    let list = Array.isArray(data) ? data : (data.skills || []);
                    for (let skill of list) {
                        if (skill.key) {
                            skillsMap.set(skill.key, skill);
                            if (skill.active) {
                                activeSkills.push({ key: skill.key, name: skill.name, icon: skill.icon });
                            }
                        }
                    }
                    statusEl.innerText = `已加载 ${skillsMap.size} 个技能，${activeSkills.length} 个主动技能`;
                    // 更新编辑器中的主动技能下拉列表（如果有打开的编辑器）
                    updateActiveSkillDropdowns();
                } catch(err) {
                    alert('加载 skill.json 失败: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        // 当主动技能列表变化时，更新所有打开的下拉框（如果有节点编辑器打开）
        function updateActiveSkillDropdowns() {
            // 由于编辑器是动态生成的，我们可以在打开编辑器时填充，这里只做全局更新。
            // 实际在打开编辑器时实时读取 activeSkills。
        }

        // ---------- 节点编辑器 ----------
        function showNodeEditor(node) {
            return new Promise((resolve) => {
                const dialog = document.createElement('div');
                dialog.className = 'node-editor';
                const isDecor = (node.nodeType === 'decor');
                const isPassive = (node.nodeType === 'passive' || node.nodeType === 'morph');
                const currentOwner = node.ownerSkillKey || '';
                const currentBranchId = node.branchId || '';
                const currentScale = node.scale || 1.0;

                // 构建主动技能下拉选项
                let skillOptions = '<option value="">无</option>';
                for (let sk of activeSkills) {
                    const selected = (sk.key === currentOwner) ? 'selected' : '';
                    skillOptions += `<option value="${sk.key}" ${selected}>${sk.name} (${sk.key})</option>`;
                }

                dialog.innerHTML = `
                    <h3>编辑节点 #${node.id}</h3>
                    <label>节点类型</label>
                    <select id="node-type">
                        <option value="active" ${node.nodeType === 'active' ? 'selected' : ''}>主动技能</option>
                        <option value="passive" ${node.nodeType === 'passive' ? 'selected' : ''}>被动技能</option>
                        <option value="morph" ${node.nodeType === 'morph' ? 'selected' : ''}>形态变化</option>
                        <option value="decor" ${node.nodeType === 'decor' ? 'selected' : ''}>装饰节点</option>
                    </select>

                    <div id="active-skill-section" style="${node.nodeType === 'active' ? '' : 'display:none;'}">
                        <label>技能键 (skillKey)</label>
                        <input type="text" id="skill-key" value="${node.skillKey || ''}" placeholder="例如 sorcerer_fire_bolt">
                        <div class="hint">主动技能必须填写 skillKey，用于关联技能数据。</div>
                    </div>

                    <div id="branch-section" style="${(node.nodeType === 'passive' || node.nodeType === 'morph') ? '' : 'display:none;'}">
                        <label>所属主动技能 (ownerSkillKey)</label>
                        <select id="owner-skill">${skillOptions}</select>
                        <label>分支ID (branchId)</label>
                        <input type="text" id="branch-id" value="${currentBranchId}" placeholder="例如 1, 2, 3...">
                        <div class="hint">分支ID在同一个主动技能下必须唯一，用于区分不同分支。</div>
                    </div>

                    <label>缩放比例 (scale)</label>
                    <input type="range" id="scale-slider" min="0.3" max="2.0" step="0.05" value="${currentScale}">
                    <span id="scale-display">${currentScale.toFixed(2)}x</span>

                    <div class="btn-group">
                        <button id="dialog-ok">确认</button>
                        <button id="dialog-cancel">取消</button>
                    </div>
                `;
                document.body.appendChild(dialog);

                // ---- DOM 引用 ----
                const typeSelect = dialog.querySelector('#node-type');
                const activeSection = dialog.querySelector('#active-skill-section');
                const branchSection = dialog.querySelector('#branch-section');
                const skillKeyInput = dialog.querySelector('#skill-key');
                const ownerSelect = dialog.querySelector('#owner-skill');
                const branchIdInput = dialog.querySelector('#branch-id');
                const scaleSlider = dialog.querySelector('#scale-slider');
                const scaleDisplay = dialog.querySelector('#scale-display');
                const okBtn = dialog.querySelector('#dialog-ok');
                const cancelBtn = dialog.querySelector('#dialog-cancel');

                // ---- 类型切换 ----
                typeSelect.addEventListener('change', () => {
                    const val = typeSelect.value;
                    activeSection.style.display = (val === 'active') ? '' : 'none';
                    branchSection.style.display = (val === 'passive' || val === 'morph') ? '' : 'none';
                });

                // ---- 缩放 ----
                scaleSlider.addEventListener('input', () => {
                    scaleDisplay.textContent = parseFloat(scaleSlider.value).toFixed(2) + 'x';
                });

                // ---- 确认 ----
                okBtn.onclick = () => {
                    const newType = typeSelect.value;
                    node.nodeType = newType;
                    node.scale = parseFloat(scaleSlider.value);

                    if (newType === 'active') {
                        node.skillKey = skillKeyInput.value.trim() || null;
                        node.ownerSkillKey = null;
                        node.branchId = null;
                    } else if (newType === 'passive' || newType === 'morph') {
                        node.skillKey = null;
                        node.ownerSkillKey = ownerSelect.value || null;
                        node.branchId = branchIdInput.value.trim() || null;
                    } else { // decor
                        node.skillKey = null;
                        node.ownerSkillKey = null;
                        node.branchId = null;
                    }
                    // 如果节点是装饰，且没有图标，可以留空
                    document.body.removeChild(dialog);
                    resolve(node);
                };

                cancelBtn.onclick = () => {
                    document.body.removeChild(dialog);
                    resolve(null);
                };

                dialog.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        document.body.removeChild(dialog);
                        resolve(null);
                    }
                });
            });
        }

        // ---------- 节点操作 ----------
        function addUniversalToken(worldX, worldY) {
            const node = {
                id: nextId++,
                skillKey: null,
                skillName: '未指定',
                x: worldX,
                y: worldY,
                iconId: null,
                borderImage: null,
                nodeType: 'decor',
                scale: 1.0,
                mod_data: null,
                ownerSkillKey: null,
                branchId: null,
            };
            nodes.push(node);
            redraw();
            statusEl.innerText = '已添加装饰节点';
            setTimeout(() => statusEl.innerText = '就绪', 1500);
        }

        function addTokenAtCenter() {
            const centerWorld = inverseTransform(canvas.width/2, canvas.height/2);
            addUniversalToken(centerWorld.x, centerWorld.y);
        }

        function deleteNodeById(nodeId) {
            nodes = nodes.filter(n => n.id !== nodeId);
            edges = edges.filter(e => e.fromNodeId !== nodeId && e.toNodeId !== nodeId);
            selectedNodes = selectedNodes.filter(n => n.id !== nodeId);
            redraw();
        }

        // ---------- 连线方向推断（简化） ----------
        function inferEdgeDirections() {
            // 简单处理：根据节点类型设定方向，用于箭头显示
            for (let edge of edges) {
                const fromNode = nodes.find(n => n.id === edge.fromNodeId);
                const toNode = nodes.find(n => n.id === edge.toNodeId);
                if (!fromNode || !toNode) continue;
                if (fromNode.nodeType === 'active' && (toNode.nodeType === 'morph' || toNode.nodeType === 'passive')) {
                    edge.direction = 'down';
                } else if ((fromNode.nodeType === 'morph' || fromNode.nodeType === 'passive') && toNode.nodeType === 'active') {
                    edge.fromNodeId = toNode.id;
                    edge.toNodeId = fromNode.id;
                    edge.direction = 'down';
                } else {
                    edge.direction = null;
                }
            }
            redraw();
        }

        // ---------- 交互 ----------
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (canvas.width / rect.width),
                y: (e.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function transformPoint(x, y) {
            return { x: x * view.zoom + view.x, y: y * view.zoom + view.y };
        }
        function inverseTransform(screenX, screenY) {
            return { x: (screenX - view.x) / view.zoom, y: (screenY - view.y) / view.zoom };
        }

        function onMouseDown(e) {
            e.preventDefault();
            const { x: screenX, y: screenY } = getCanvasCoords(e);
            const world = inverseTransform(screenX, screenY);

            let hitNode = null;
            for (let node of nodes) {
                const radius = 32 * (node.scale || 1.0);
                if (Math.hypot(world.x - node.x, world.y - node.y) < radius) {
                    hitNode = node;
                    break;
                }
            }

            if (currentMode === 'link') {
                if (hitNode) {
                    if (linkSelectedNode === null) {
                        linkSelectedNode = hitNode;
                        statusEl.innerText = `已选 ${hitNode.id}，点击另一节点连线`;
                        redraw();
                    } else {
                        if (linkSelectedNode !== hitNode) {
                            const exists = edges.some(e =>
                                (e.fromNodeId === linkSelectedNode.id && e.toNodeId === hitNode.id) ||
                                (e.fromNodeId === hitNode.id && e.toNodeId === linkSelectedNode.id)
                            );
                            if (!exists) {
                                edges.push({ fromNodeId: linkSelectedNode.id, toNodeId: hitNode.id });
                                inferEdgeDirections();
                                statusEl.innerText = '已添加连线';
                            } else {
                                statusEl.innerText = '连线已存在';
                            }
                        }
                        linkSelectedNode = null;
                        redraw();
                    }
                } else {
                    linkSelectedNode = null;
                    redraw();
                }
                return;
            }

            if (hitNode) {
                if (ctrlPressed) {
                    const idx = selectedNodes.indexOf(hitNode);
                    if (idx >= 0) selectedNodes.splice(idx, 1);
                    else selectedNodes.push(hitNode);
                    redraw();
                } else {
                    selectedNodes = [hitNode];
                    redraw();
                }
                dragNode = hitNode;
                dragNodeOffset.x = world.x - hitNode.x;
                dragNodeOffset.y = world.y - hitNode.y;
                canvas.style.cursor = 'grabbing';
                return;
            } else {
                selectedNodes = [];
                redraw();
            }

            isDragging = true;
            dragStart.x = screenX;
            dragStart.y = screenY;
            canvas.style.cursor = 'grabbing';
        }

        function onMouseMove(e) {
            if (dragNode) {
                const { x: screenX, y: screenY } = getCanvasCoords(e);
                const world = inverseTransform(screenX, screenY);
                dragNode.x = world.x - dragNodeOffset.x;
                dragNode.y = world.y - dragNodeOffset.y;
                redraw();
                return;
            }
            if (isDragging) {
                const { x: screenX, y: screenY } = getCanvasCoords(e);
                view.x += screenX - dragStart.x;
                view.y += screenY - dragStart.y;
                dragStart.x = screenX;
                dragStart.y = screenY;
                redraw();
            }
        }

        function onMouseUp() {
            dragNode = null;
            isDragging = false;
            canvas.style.cursor = 'grab';
        }

        function onWheel(e) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            let newZoom = view.zoom * delta;
            newZoom = Math.min(3, Math.max(0.2, newZoom));
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
            const worldX = (mouseX - view.x) / view.zoom;
            const worldY = (mouseY - view.y) / view.zoom;
            view.zoom = newZoom;
            view.x = mouseX - worldX * view.zoom;
            view.y = mouseY - worldY * view.zoom;
            redraw();
        }

        function onDoubleClick(e) {
            const { x: screenX, y: screenY } = getCanvasCoords(e);
            const world = inverseTransform(screenX, screenY);
            for (let node of nodes) {
                const radius = 32 * (node.scale || 1.0);
                if (Math.hypot(world.x - node.x, world.y - node.y) < radius) {
                    showNodeEditor(node).then(() => {});
                    break;
                }
            }
        }

        function onContextMenu(e) {
            e.preventDefault();
            const { x: screenX, y: screenY } = getCanvasCoords(e);
            const world = inverseTransform(screenX, screenY);
            for (let node of nodes) {
                const radius = 32 * (node.scale || 1.0);
                if (Math.hypot(world.x - node.x, world.y - node.y) < radius) {
                    if (confirm(`删除节点 #${node.id} 及其所有连线？`)) {
                        deleteNodeById(node.id);
                    }
                    break;
                }
            }
        }

        function onKeyDown(e) {
            if (e.key === 'Control' || e.key === 'Meta') ctrlPressed = true;
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (selectedNodes.length > 0) {
                    const ids = selectedNodes.map(n => n.id);
                    if (confirm(`删除 ${ids.length} 个选中节点？`)) {
                        nodes = nodes.filter(n => !ids.includes(n.id));
                        edges = edges.filter(e => !ids.includes(e.fromNodeId) && !ids.includes(e.toNodeId));
                        selectedNodes = [];
                        redraw();
                        statusEl.innerText = `已删除 ${ids.length} 个节点`;
                        setTimeout(() => statusEl.innerText = '就绪', 1500);
                    }
                    e.preventDefault();
                }
            }
        }

        function onKeyUp(e) {
            if (e.key === 'Control' || e.key === 'Meta') ctrlPressed = false;
        }

        // ---------- 绘制 ----------
        function drawArrow(ctx, fromX, fromY, toX, toY, color) {
            const headLen = 12;
            const angle = Math.atan2(toY - fromY, toX - fromX);
            const tipX = toX - 4;
            const tipY = toY - 4;
            ctx.save();
            ctx.translate(tipX, tipY);
            ctx.rotate(angle);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-headLen, -headLen/2);
            ctx.lineTo(-headLen, headLen/2);
            ctx.closePath();
            ctx.fillStyle = color || '#8a9bb5';
            ctx.fill();
            ctx.restore();
        }

        function drawLine(ctx, p1, p2, direction) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = '#8a9bb5';
            ctx.lineWidth = 3;
            ctx.stroke();
            if (direction === 'down') {
                drawArrow(ctx, p1.x, p1.y, p2.x, p2.y, '#FFD700');
            }
        }

        function render() {
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0, 0, w, h);
            ctx.save();

            // 连线
            for (let edge of edges) {
                const fromNode = nodes.find(n => n.id === edge.fromNodeId);
                const toNode = nodes.find(n => n.id === edge.toNodeId);
                if (!fromNode || !toNode) continue;
                const p1 = transformPoint(fromNode.x, fromNode.y);
                const p2 = transformPoint(toNode.x, toNode.y);
                drawLine(ctx, p1, p2, edge.direction);
            }

            // 节点
            for (let node of nodes) {
                const pos = transformPoint(node.x, node.y);
                const isSelected = selectedNodes.includes(node);
                const radius = 28 * (node.scale || 1.0);

                // 边框（简化）
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, radius, 0, 2 * Math.PI);
                ctx.fillStyle = node.nodeType === 'active' ? '#2a4a6a' :
                                (node.nodeType === 'decor' ? '#3a3a3a' : '#3a5a3a');
                ctx.fill();
                ctx.strokeStyle = isSelected ? '#fff' : '#888';
                ctx.lineWidth = isSelected ? 2 : 1;
                ctx.stroke();

                // 文本
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '12px sans-serif';
                let label = node.skillName || `#${node.id}`;
                if (label.length > 12) label = label.slice(0,10)+'…';
                ctx.fillText(label, pos.x, pos.y);

                // 选中高亮
                if (isSelected) {
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, radius+4, 0, 2*Math.PI);
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4,4]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // 显示分支归属信息（调试）
                if (node.nodeType === 'passive' || node.nodeType === 'morph') {
                    if (node.ownerSkillKey && node.branchId) {
                        ctx.fillStyle = '#aaa';
                        ctx.font = '10px sans-serif';
                        ctx.fillText(`→${node.ownerSkillKey}:${node.branchId}`, pos.x, pos.y + radius + 16);
                    }
                }
            }
            ctx.restore();
        }

        function redraw() {
            if (!canvas) return;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            render();
        }

        // ---------- 保存/加载 ----------
        function saveLayout() {
            if (nodes.length === 0) {
                alert('没有节点可保存');
                return;
            }
            const xs = nodes.map(n => n.x);
            const ys = nodes.map(n => n.y);
            const minX = Math.min(...xs);
            const maxX = Math.max(...xs);
            const minY = Math.min(...ys);
            const maxY = Math.max(...ys);
            const centerX = (minX + maxX) / 2;
            const centerY = (minY + maxY) / 2;

            // 只保留必要字段
            const layout = {
                version: '4.0',
                bounds: { minX, maxX, minY, maxY },
                offsetX: centerX,
                offsetY: centerY,
                backgroundMargin: 250,
                backgroundImagePath: null,
                nodes: nodes.map(n => ({
                    id: n.id,
                    skillKey: n.skillKey || null,
                    skillName: n.skillName || '未指定',
                    x: n.x - centerX,
                    y: n.y - centerY,
                    iconId: n.iconId || null,
                    borderImage: n.borderImage || null,
                    nodeType: n.nodeType || 'decor',
                    scale: n.scale || 1.0,
                    mod_data: n.mod_data || null,
                    ownerSkillKey: n.ownerSkillKey || null,
                    branchId: n.branchId || null,
                })),
                edges: edges.map(e => ({
                    fromNodeId: e.fromNodeId,
                    toNodeId: e.toNodeId,
                    direction: e.direction || null
                }))
            };

            const dataStr = JSON.stringify(layout, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'skilltree_layout.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            statusEl.innerText = `已保存 ${nodes.length} 个节点`;
        }

        function loadLayoutFromFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const layout = JSON.parse(e.target.result);
                    let loadedNodes = layout.nodes || [];
                    if (layout.offsetX !== undefined && layout.offsetY !== undefined) {
                        loadedNodes = loadedNodes.map(n => ({
                            ...n,
                            x: n.x + layout.offsetX,
                            y: n.y + layout.offsetY
                        }));
                    }
                    nodes = loadedNodes.map(n => ({
                        id: n.id,
                        skillKey: n.skillKey || null,
                        skillName: n.skillName || '未指定',
                        x: n.x,
                        y: n.y,
                        iconId: n.iconId || null,
                        borderImage: n.borderImage || null,
                        nodeType: n.nodeType || 'decor',
                        scale: n.scale || 1.0,
                        mod_data: n.mod_data || null,
                        ownerSkillKey: n.ownerSkillKey || null,
                        branchId: n.branchId || null,
                    }));
                    edges = (layout.edges || []).map(e => ({
                        fromNodeId: e.fromNodeId,
                        toNodeId: e.toNodeId,
                        direction: e.direction || null
                    }));
                    let maxId = 100;
                    nodes.forEach(n => { if (n.id >= maxId) maxId = n.id + 1; });
                    nextId = maxId;
                    selectedNodes = [];
                    inferEdgeDirections();
                    redraw();
                    statusEl.innerText = `已加载 ${nodes.length} 个节点`;
                } catch(err) {
                    alert('加载失败: '+err.message);
                }
            };
            reader.readAsText(file);
        }

        function resetNodesPosition() {
            const startX = -300, startY = -200;
            const stepX = 150, stepY = 120;
            for (let i = 0; i < nodes.length; i++) {
                nodes[i].x = startX + (i % 6) * stepX;
                nodes[i].y = startY + Math.floor(i / 6) * stepY;
            }
            redraw();
            statusEl.innerText = '节点已重新排列';
            setTimeout(() => statusEl.innerText = '就绪', 1500);
        }

        function resetView() {
            if (!nodes.length) return;
            const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
            const minX = Math.min(...xs), maxX = Math.max(...xs);
            const minY = Math.min(...ys), maxY = Math.max(...ys);
            const width = maxX - minX, height = maxY - minY;
            const padding = 100;
            const targetW = canvas.width - padding * 2;
            const targetH = canvas.height - padding * 2;
            let zoom = Math.min(targetW / width, targetH / height, 1.2);
            if (zoom < 0.1) zoom = 0.1;
            view.zoom = zoom;
            const centerX = (minX + maxX) / 2, centerY = (minY + maxY) / 2;
            view.x = canvas.width / 2 - centerX * zoom;
            view.y = canvas.height / 2 - centerY * zoom;
            redraw();
        }

        // ---------- UI绑定 ----------
        function bindUI() {
            document.getElementById('btn-add-token').addEventListener('click', addTokenAtCenter);
            document.getElementById('btn-pan').addEventListener('click', () => {
                currentMode = 'pan';
                linkSelectedNode = null;
                document.getElementById('btn-pan').classList.add('active');
                document.getElementById('btn-link').classList.remove('active');
            });
            document.getElementById('btn-link').addEventListener('click', () => {
                currentMode = 'link';
                linkSelectedNode = null;
                document.getElementById('btn-link').classList.add('active');
                document.getElementById('btn-pan').classList.remove('active');
            });
            document.getElementById('btn-zoom-in').addEventListener('click', () => {
                view.zoom = Math.min(3, view.zoom * 1.2);
                redraw();
            });
            document.getElementById('btn-zoom-out').addEventListener('click', () => {
                view.zoom = Math.max(0.2, view.zoom / 1.2);
                redraw();
            });
            document.getElementById('btn-clear-edges').addEventListener('click', () => { edges = []; redraw(); });
            document.getElementById('btn-reset-nodes').addEventListener('click', resetNodesPosition);
            document.getElementById('btn-save').addEventListener('click', saveLayout);
            document.getElementById('btn-reset-view').addEventListener('click', resetView);
            document.getElementById('load-skills-label').onclick = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'application/json';
                input.onchange = (e) => loadSkills(e.target.files[0]);
                input.click();
            };
            document.getElementById('load-layout-label').onclick = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'application/json';
                input.onchange = (e) => loadLayoutFromFile(e.target.files[0]);
                input.click();
            };
            statusEl.innerText = '就绪';
        }

        // ---------- 初始化 ----------
        function init() {
            function resizeCanvas() {
                canvas.width = container.clientWidth;
                canvas.height = container.clientHeight;
                redraw();
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            canvas.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('wheel', onWheel, { passive: false });
            canvas.addEventListener('dblclick', onDoubleClick);
            canvas.addEventListener('contextmenu', onContextMenu);
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            canvas.style.cursor = 'grab';

            bindUI();
            redraw();
        }

        init();
    })();
</script>
</body>
</html>
