<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能树编辑器 - 方形图标 + 边框图片</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1e1e2f; color: #eee; }
        #toolbar {
            position: fixed; top: 10px; left: 10px; right: 10px;
            background: #2a2e3a; padding: 8px 16px; border-radius: 12px;
            display: flex; gap: 12px; flex-wrap: wrap; z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5); align-items: center;
            max-height: 120px; overflow-y: auto;
        }
        #toolbar button, #toolbar label.file-label {
            background: #3a3f4a; border: none; color: white; padding: 4px 12px;
            border-radius: 20px; cursor: pointer; font-size: 13px;
            display: inline-block; white-space: nowrap;
        }
        #toolbar button.active { background: #f0b27a; color: #1e1e2f; }
        #toolbar button:hover, #toolbar label.file-label:hover { background: #5a6f8a; }
        .separator { width: 1px; background: #5a6f8a; margin: 0 6px; }
        .style-panel {
            background: #1a1e2a; padding: 4px 10px; border-radius: 28px;
            display: inline-flex; gap: 8px; align-items: center; flex-wrap: wrap;
        }
        .style-panel label { font-size: 12px; }
        input[type="color"] { width: 28px; height: 22px; border: none; border-radius: 4px; cursor: pointer; }
        input[type="range"] { width: 70px; }
        input[type="number"] { width: 70px; background:#3a3f4a; border:none; color:#fff; padding:4px; border-radius:4px; }
        #status { margin-left: auto; font-size: 12px; background: #1e1e2f; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
        #canvas-container {
            position: absolute; top: 80px; left: 0; right: 0; bottom: 0;
            background: #0f121a; overflow: hidden; cursor: grab;
        }
        canvas { display: block; background: #0f121a; }
        .info-panel {
            position: fixed; bottom: 16px; right: 16px;
            background: #1e1e2fcc; backdrop-filter: blur(4px);
            padding: 6px 12px; border-radius: 20px; font-size: 12px;
            pointer-events: none; z-index: 100;
        }
        .skill-dialog {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #2a2e3a; border-radius: 16px; padding: 16px;
            width: 420px; max-height: 600px; overflow-y: auto;
            z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .skill-dialog h3 { margin: 0 0 10px 0; }
        .skill-dialog input { width: 100%; padding: 6px; margin-bottom: 10px; border-radius: 8px; border: none; background: #3a3f4a; color: #eee; }
        .skill-dialog input[type="text"] { width: 100%; }
        .skill-item { padding: 6px; cursor: pointer; border-bottom: 1px solid #3a3f4a; }
        .skill-item:hover { background: #3a6f5c; }
        .dialog-buttons { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
        .dialog-buttons button { padding: 4px 12px; }
        .icon-section {
            margin-top: 12px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
        .icon-section label { font-size: 13px; display: block; margin-bottom: 4px; }
        .icon-section .icon-input-row { display: flex; gap: 6px; }
        .icon-section .icon-input-row input { flex: 1; }
        .icon-section .icon-input-row button { padding: 4px 12px; }
        .passive-section {
            margin-top: 12px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
        .passive-section label { font-size: 13px; display: block; margin-bottom: 6px; }
        .passive-toggle-btn {
            background: #3a3f4a;
            border: none;
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .passive-toggle-btn.active {
            background: #4a7a9a;
            box-shadow: 0 0 12px rgba(74, 122, 154, 0.4);
        }
        .passive-toggle-btn:hover { background: #5a6f8a; }
        .passive-toggle-btn.active:hover { background: #5a8aaa; }
        .border-section {
            margin-top: 12px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
        .border-section label { font-size: 13px; display: block; margin-bottom: 4px; }
        .border-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .border-row input[type="file"] { display: none; }
        .border-row .file-upload-btn {
            background: #3a5a4a;
            border: none;
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .border-row .file-upload-btn:hover { background: #4a7a5a; }
        .border-row .path-display {
            font-size: 11px;
            color: #88ccff;
            word-break: break-all;
            flex: 1;
            min-width: 100px;
            background: #1a1e2a;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .border-preview-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            border: 1px solid #555;
            background: #222;
        }
        .border-info {
            font-size: 11px;
            color: #888;
        }
        .batch-actions {
            display: inline-flex;
            gap: 6px;
            align-items: center;
        }
        .batch-actions button {
            background: #3a4a6a;
        }
        .batch-actions button:hover {
            background: #5a7a9a;
        }
        .selection-count {
            font-size: 12px;
            color: #88ccff;
            margin-left: 6px;
        }
        .batch-passive-btn {
            background: #4a5a3a !important;
        }
        .batch-passive-btn:hover {
            background: #6a8a5a !important;
        }
        .batch-active-btn {
            background: #5a3a3a !important;
        }
        .batch-active-btn:hover {
            background: #8a5a5a !important;
        }
    </style>
</head>
<body>
<div id="toolbar">
    <button id="btn-add-token">➕ 添加万能Token</button>
    <div class="separator"></div>
    <div class="style-panel">
        <span>🎨 连线样式（仅UI，不保存）：</span>
        <label>颜色</label>
        <input type="color" id="line-color" value="#8a9bb5">
        <label>粗细</label>
        <input type="range" id="line-width" min="1" max="8" step="1" value="4">
        <label>虚线</label>
        <button id="toggle-dash" style="padding: 0 8px;">◻️ 关闭</button>
        <span>|</span>
        <label>纹理</label>
        <button id="toggle-texture" class="active" style="padding: 0 10px;">✔️ 开启</button>
    </div>
    <div class="style-panel">
        <label>背景边距</label>
        <input type="number" id="bg-margin" value="250" style="width:60px; background:#3a3f4a; border:none; color:#fff; padding:4px; border-radius:4px;">
        <span style="font-size:11px; color:#aaa;">(保存时写入)</span>
    </div>
    <div class="separator"></div>
    <button id="btn-pan" class="active">🖱️ 平移</button>
    <button id="btn-link">🔗 连线模式</button>
    <button id="btn-zoom-in">➕</button>
    <button id="btn-zoom-out">➖</button>
    <button id="btn-clear-edges">🗑️ 清连线</button>
    <button id="btn-reset-nodes">🔄 重置位置</button>
    <div class="separator"></div>
    <span class="batch-actions">
        <button id="btn-batch-border">🖼️ 批量设置边框</button>
        <button id="btn-clear-batch-border">✕ 清除选中边框</button>
        <span id="selection-count" class="selection-count">已选: 0</span>
    </span>
    <div class="separator"></div>
    <span class="batch-actions">
        <button id="btn-batch-passive" class="batch-passive-btn">📥 批量被动</button>
        <button id="btn-batch-active" class="batch-active-btn">📤 批量主动</button>
    </span>
    <div class="separator"></div>
    <button id="btn-import-bg">📂 导入背景</button>
    <button id="btn-clear-bg">✕ 清除背景</button>
    <div class="separator"></div>
    <label class="file-label" id="load-skills-label">📂 skill.json</label>
    <label class="file-label" id="load-layout-label">📂 布局</label>
    <button id="btn-save">💾 保存布局</button>
    <button id="btn-reset-view">🖥️ 重置视图</button>
    <div id="status">就绪</div>
</div>
<div id="canvas-container">
    <canvas id="editorCanvas"></canvas>
</div>
<div class="info-panel">
    💡 拖拽空白平移；滚轮缩放；连线模式点击两个节点连线；<br>
    🖱️ **Ctrl+左键** 多选节点；单击选中单个节点（取消其他选中）。<br>
    双击节点编辑：绑定技能/分支，或上传边框图片。<br>
    📥 **被动技能**：双击节点 → 点击"设为被动"，节点缩小65%<br>
    🌄 **背景图片**：默认加载 <code>images/skill_bg.png</code>，可手动导入其他图片（路径记录到布局文件）<br>
    📌 背景图范围受"背景边距"控制（默认250），与主程序一致<br>
    🔗 连线只记录起点和终点，不保存样式。
</div>

<script>
    (function() {
        // ---------- DOM ----------
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        const statusEl = document.getElementById('status');

        // ---------- 数据 ----------
        let nodes = [];
        let edges = [];
        let selectedNodes = [];
        let nextId = 100;
        let skillsMap = new Map();
        let allSkillsList = [];
        let iconCache = new Map();
        let borderImageCache = new Map();

        // 背景图片
        let bgImage = null;
        let bgImagePath = null;  // 存储相对路径，如 "images/my_bg.png"

        let view = { x: 0, y: 0, zoom: 1 };
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragNode = null;
        let dragNodeOffset = { x: 0, y: 0 };
        let currentMode = 'pan';
        let linkSelectedNode = null;
        let ctrlPressed = false;

        // ---------- 样式 ----------
        let lineColor = "#8a9bb5";
        let lineWidth = 4;
        let lineDash = false;
        let useTexture = true;

        let lineTextureImg = null;
        let textureLoaded = false;

        function generateDefaultTexture() {
            const texWidth = 128, texHeight = 24;
            const offscreen = document.createElement('canvas');
            offscreen.width = texWidth; offscreen.height = texHeight;
            const offCtx = offscreen.getContext('2d');
            const grad = offCtx.createLinearGradient(0, 0, texWidth, 0);
            grad.addColorStop(0, '#FF6B6B');
            grad.addColorStop(0.3, '#FECA57');
            grad.addColorStop(0.7, '#48DBFB');
            grad.addColorStop(1, '#A29BFE');
            offCtx.fillStyle = grad;
            offCtx.fillRect(0, 0, texWidth, texHeight);
            offCtx.strokeStyle = 'rgba(255,255,255,0.3)';
            offCtx.lineWidth = 2;
            for (let i = 0; i < texWidth; i += 12) {
                offCtx.beginPath();
                offCtx.moveTo(i, 2);
                offCtx.lineTo(i + 6, texHeight - 2);
                offCtx.stroke();
            }
            offCtx.shadowColor = 'rgba(255,255,255,0.2)';
            offCtx.shadowBlur = 8;
            offCtx.beginPath();
            offCtx.arc(0, texHeight/2, texHeight/2, 0, Math.PI*2);
            offCtx.fillStyle = '#FF6B6B';
            offCtx.fill();
            offCtx.beginPath();
            offCtx.arc(texWidth, texHeight/2, texHeight/2, 0, Math.PI*2);
            offCtx.fillStyle = '#A29BFE';
            offCtx.fill();
            return offscreen.toDataURL('image/png');
        }

        function loadDefaultTexture() {
            const url = generateDefaultTexture();
            const img = new Image();
            img.onload = () => {
                lineTextureImg = img;
                textureLoaded = true;
                redraw();
            };
            img.src = url;
        }

        // ---------- 辅助 ----------
        function transformPoint(x, y) {
            return { x: x * view.zoom + view.x, y: y * view.zoom + view.y };
        }
        function inverseTransform(screenX, screenY) {
            return { x: (screenX - view.x) / view.zoom, y: (screenY - view.y) / view.zoom };
        }

        // ---------- 图标加载 ----------
        function loadSkillIcon(skillKey, callback) {
            if (iconCache.has(skillKey)) {
                callback(iconCache.get(skillKey));
                return;
            }
            const img = new Image();
            img.onload = () => { iconCache.set(skillKey, img); callback(img); };
            img.onerror = () => { iconCache.set(skillKey, null); callback(null); };
            img.src = `images/icons/${skillKey}.png`;
        }

        function loadIconById(iconId, callback) {
            const key = 'id_' + iconId;
            if (iconCache.has(key)) {
                callback(iconCache.get(key));
                return;
            }
            const img = new Image();
            img.onload = () => { iconCache.set(key, img); callback(img); };
            img.onerror = () => { iconCache.set(key, null); callback(null); };
            img.src = `images/icons/${iconId}.png`;
        }

        // ---------- 边框图片加载与缓存 ----------
        function loadBorderImage(path, callback) {
            if (borderImageCache.has(path)) {
                callback(borderImageCache.get(path));
                return;
            }
            const img = new Image();
            img.onload = () => {
                borderImageCache.set(path, img);
                callback(img);
            };
            img.onerror = () => {
                borderImageCache.set(path, null);
                callback(null);
            };
            img.src = path;
        }

        // ---------- 背景图片 ----------
        function loadDefaultBackground() {
            const img = new Image();
            img.onload = () => {
                bgImage = img;
                bgImagePath = 'images/skill_bg.png';
                statusEl.innerText = '背景已加载: images/skill_bg.png';
                redraw();
                setTimeout(() => statusEl.innerText = '就绪', 2000);
            };
            img.onerror = () => {
                bgImage = null;
                bgImagePath = null;
                statusEl.innerText = '默认背景不存在，可手动导入';
                setTimeout(() => statusEl.innerText = '就绪', 2000);
            };
            img.src = 'images/skill_bg.png';
        }

        function importBackground() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // 自动生成路径：images/文件名
                const relativePath = `images/${file.name}`;
                bgImagePath = relativePath;

                // 预览图片
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        bgImage = img;
                        statusEl.innerText = `背景已导入: ${relativePath}`;
                        redraw();
                        setTimeout(() => statusEl.innerText = '就绪', 3000);
                    };
                    img.onerror = () => {
                        statusEl.innerText = '❌ 背景图片加载失败';
                        setTimeout(() => statusEl.innerText = '就绪', 2000);
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function clearBackground() {
            bgImage = null;
            bgImagePath = null;
            statusEl.innerText = '背景已清除';
            redraw();
            setTimeout(() => statusEl.innerText = '就绪', 1500);
        }

        // ---------- 分支解析 ----------
        function parseBranches(skill) {
            const mods = skill.mods || [];
            const morphs = [];
            const passives = [];
            for (let mod of mods) {
                const name = mod.name || '';
                if (['强化', '变体', '形态', '替换', '变为'].some(kw => name.includes(kw))) {
                    morphs.push(mod);
                } else {
                    passives.push(mod);
                }
            }
            const all = [...morphs, ...passives];
            return all.map(m => ({
                id: String(m.modId || m.id || ''),
                name: m.name || '',
                desc: (m.desc || ['']).join('\n'),
                type: morphs.includes(m) ? 'morph' : 'passive'
            }));
        }

        // ---------- 分支选择对话框 ----------
        function showBranchDialog(node, skillKey, skill) {
            return new Promise((resolve) => {
                const branches = parseBranches(skill);
                if (branches.length === 0) {
                    resolve(null);
                    return;
                }
                const dialog = document.createElement('div');
                dialog.className = 'skill-dialog';
                dialog.innerHTML = `
                    <h3>选择分支绑定到节点</h3>
                    <p style="font-size:12px; color:#aaa;">技能: ${skill.name}</p>
                    <div id="branch-list" style="max-height: 300px; overflow-y: auto;"></div>
                    <div class="dialog-buttons">
                        <button id="branch-cancel">跳过（不绑定分支）</button>
                    </div>
                `;
                document.body.appendChild(dialog);
                const branchListDiv = dialog.querySelector('#branch-list');
                const cancelBtn = dialog.querySelector('#branch-cancel');

                for (let branch of branches) {
                    const div = document.createElement('div');
                    div.className = 'skill-item';
                    div.innerHTML = `<strong>${branch.name}</strong> <span style="font-size:11px; color:#88CCFF;">[${branch.type}]</span><br><span style="font-size:11px; color:#aaa;">${branch.desc.slice(0,50)}${branch.desc.length>50?'...':''}</span>`;
                    div.onclick = () => {
                        document.body.removeChild(dialog);
                        resolve(branch);
                    };
                    branchListDiv.appendChild(div);
                }
                cancelBtn.onclick = () => {
                    document.body.removeChild(dialog);
                    resolve(null);
                };
            });
        }

        // ---------- 节点操作 ----------
        function updateNodeSkill(node, skillKey) {
            const skill = skillsMap.get(skillKey);
            if (!skill) return false;
            node.skillKey = skillKey;
            node.skillName = skill.name;
            node.branchSkill = null;
            node.branchId = null;
            node.iconId = null;
            loadSkillIcon(skillKey, (img) => {
                node.iconImg = img;
                redraw();
            });
            return true;
        }

        function setNodeIcon(node, iconId) {
            node.iconId = iconId;
            if (iconId) {
                loadIconById(iconId, (img) => {
                    node.iconImg = img;
                    redraw();
                });
            } else {
                node.iconImg = null;
                redraw();
            }
            statusEl.innerText = `已设置图标 ID: ${iconId}`;
            setTimeout(() => statusEl.innerText = '就绪', 2000);
        }

        function addUniversalToken(worldX, worldY) {
            const node = {
                id: nextId++,
                skillKey: null,
                skillName: '未指定',
                x: worldX,
                y: worldY,
                iconImg: null,
                iconId: null,
                branchSkill: null,
                branchId: null,
                borderImage: null,
                borderImg: null,
                isPassive: false,
            };
            nodes.push(node);
            redraw();
            statusEl.innerText = '已添加万能token';
            setTimeout(() => statusEl.innerText = '就绪', 1500);
        }

        function addTokenAtCenter() {
            const centerWorld = inverseTransform(canvas.width/2, canvas.height/2);
            const offset = nodes.length * 15;
            addUniversalToken(centerWorld.x + offset, centerWorld.y + offset);
        }

        function deleteNodeById(nodeId) {
            nodes = nodes.filter(n => n.id !== nodeId);
            edges = edges.filter(e => e.fromNodeId !== nodeId && e.toNodeId !== nodeId);
            selectedNodes = selectedNodes.filter(n => n.id !== nodeId);
            redraw();
            statusEl.innerText = '已删除节点';
            setTimeout(() => statusEl.innerText = '就绪', 1500);
        }

        function setNodeBorderImage(node, path) {
            if (!path) {
                node.borderImage = null;
                node.borderImg = null;
                redraw();
                return;
            }
            node.borderImage = path;
            loadBorderImage(path, (img) => {
                node.borderImg = img;
                redraw();
            });
        }

        function batchSetPassive(isPassive) {
            if (selectedNodes.length === 0) {
                alert('请先选中一个或多个节点（Ctrl+左键多选）');
                return;
            }
            for (let node of selectedNodes) {
                node.isPassive = isPassive;
            }
            redraw();
            statusEl.innerText = `已${isPassive ? '设为被动' : '设为主动'} ${selectedNodes.length} 个节点`;
            setTimeout(() => statusEl.innerText = '就绪', 1500);
        }

        // ---------- 技能选择对话框 ----------
        async function showSkillDialog(node) {
            const dialog = document.createElement('div');
            dialog.className = 'skill-dialog';
            const isPassive = node.isPassive || false;
            dialog.innerHTML = `
                <h3>编辑节点 #${node.id}</h3>
                <p style="font-size:12px; color:#aaa;">${node.skillName}</p>
                <div style="margin-bottom: 6px;">
                    <input type="text" id="skill-search" placeholder="搜索技能名称或key...">
                </div>
                <div id="skill-list" style="max-height: 130px; overflow-y: auto;"></div>

                <div class="icon-section">
                    <label>图标ID（数字，不绑定技能）：</label>
                    <div class="icon-input-row">
                        <input type="text" id="icon-id-input" placeholder="例如 3884463898" value="${node.iconId || ''}">
                        <button id="set-icon-btn">设置</button>
                        <button id="clear-icon-btn" style="background:#5a2a2a;">清除</button>
                    </div>
                </div>

                <div class="passive-section">
                    <label>📥 技能类型：</label>
                    <button id="passive-toggle-btn" class="passive-toggle-btn ${isPassive ? 'active' : ''}">
                        ${isPassive ? '✅ 被动技能' : '📥 设为被动'}
                    </button>
                    <span style="font-size:11px; color:#888; margin-left:8px;">
                        ${isPassive ? '（节点缩小65%）' : '（主动技能，正常大小）'}
                    </span>
                </div>

                <div class="border-section">
                    <label>🖼️ 边框图片（上传后自动生成路径 images/icons/文件名）：</label>
                    <div class="border-row">
                        <label class="file-upload-btn">
                            📁 上传图片
                            <input type="file" id="border-file-input" accept="image/*">
                        </label>
                        <span class="path-display" id="border-path-display">${node.borderImage || '未选择'}</span>
                        <button id="clear-border-btn" style="background:#5a2a2a; border:none; color:white; padding:4px 12px; border-radius:20px; cursor:pointer; font-size:12px;">✕ 清除</button>
                    </div>
                    <div style="margin-top:6px; display:flex; align-items:center; gap:12px;">
                        <span style="font-size:11px; color:#888;">预览：</span>
                        <img id="border-preview-img" class="border-preview-img" src="${node.borderImage || ''}" style="${node.borderImage ? '' : 'display:none;'}">
                        <span id="border-status" class="border-info">${node.borderImage ? '✅ ' + node.borderImage : '未设置边框图片'}</span>
                    </div>
                    <div style="margin-top:4px; font-size:10px; color:#666;">
                        💡 边框尺寸自动适配图标大小（边框 = 图标 × 1.6 倍）
                    </div>
                </div>

                <div class="dialog-buttons">
                    <button id="dialog-ok">确认</button>
                    <button id="dialog-cancel">取消</button>
                </div>
            `;
            document.body.appendChild(dialog);

            const passiveBtn = dialog.querySelector('#passive-toggle-btn');
            let tempIsPassive = isPassive;

            passiveBtn.addEventListener('click', () => {
                tempIsPassive = !tempIsPassive;
                passiveBtn.textContent = tempIsPassive ? '✅ 被动技能' : '📥 设为被动';
                passiveBtn.classList.toggle('active', tempIsPassive);
                const hint = passiveBtn.parentElement.querySelector('span');
                if (hint) {
                    hint.textContent = tempIsPassive ? '（节点缩小65%）' : '（主动技能，正常大小）';
                }
                node.isPassive = tempIsPassive;
                redraw();
            });

            const searchInput = dialog.querySelector('#skill-search');
            const skillListDiv = dialog.querySelector('#skill-list');
            let currentSkills = allSkillsList.length ? [...allSkillsList] : [];

            const fileInput = dialog.querySelector('#border-file-input');
            const previewImg = dialog.querySelector('#border-preview-img');
            const borderStatus = dialog.querySelector('#border-status');
            const pathDisplay = dialog.querySelector('#border-path-display');
            let tempBorderPath = node.borderImage || null;

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const relativePath = `images/icons/${file.name}`;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        previewImg.src = ev.target.result;
                        previewImg.style.display = 'block';
                        tempBorderPath = relativePath;
                        setNodeBorderImage(node, relativePath);
                        pathDisplay.textContent = relativePath;
                        borderStatus.textContent = `✅ ${relativePath}`;
                        borderStatus.style.color = '#4ecdc4';
                        statusEl.innerText = `已设置边框图片: ${relativePath}`;
                        setTimeout(() => statusEl.innerText = '就绪', 2000);
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });

            dialog.querySelector('#clear-border-btn').onclick = () => {
                tempBorderPath = null;
                previewImg.style.display = 'none';
                previewImg.src = '';
                pathDisplay.textContent = '未选择';
                borderStatus.textContent = '未设置边框图片';
                borderStatus.style.color = '#888';
                setNodeBorderImage(node, null);
                redraw();
            };

            function renderSkillList(skills) {
                skillListDiv.innerHTML = '';
                if (!skills.length) {
                    skillListDiv.innerHTML = '<div style="padding:8px; color:#888;">暂无技能，请先加载 skill.json</div>';
                    return;
                }
                for (let sk of skills) {
                    const div = document.createElement('div');
                    div.className = 'skill-item';
                    const isActive = sk.active !== undefined ? (sk.active ? '🟢主动' : '🟡被动') : '';
                    div.innerHTML = `<strong>${sk.name}</strong> <span style="font-size:10px; color:#888;">${isActive}</span><br><span style="font-size: 11px;">${sk.key}</span>`;
                    div.onclick = async () => {
                        if (updateNodeSkill(node, sk.key)) {
                            const branch = await showBranchDialog(node, sk.key, sk);
                            if (branch) {
                                node.branchSkill = sk.key;
                                node.branchId = branch.id;
                                node.skillName = sk.name + ' → ' + branch.name;
                                node.iconImg = null;
                                statusEl.innerText = `已绑定分支: ${branch.name}`;
                            } else {
                                statusEl.innerText = `已指定技能: ${sk.name}`;
                            }
                            if (sk.active !== undefined) {
                                node.isPassive = !sk.active;
                                tempIsPassive = node.isPassive;
                                passiveBtn.textContent = node.isPassive ? '✅ 被动技能' : '📥 设为被动';
                                passiveBtn.classList.toggle('active', node.isPassive);
                                const hint = passiveBtn.parentElement.querySelector('span');
                                if (hint) {
                                    hint.textContent = node.isPassive ? '（节点缩小65%）' : '（主动技能，正常大小）';
                                }
                            }
                            if (tempBorderPath) setNodeBorderImage(node, tempBorderPath);
                            redraw();
                        } else {
                            alert('技能数据异常');
                        }
                        document.body.removeChild(dialog);
                    };
                    skillListDiv.appendChild(div);
                }
            }

            function filterSkills() {
                const keyword = searchInput.value.toLowerCase();
                const filtered = currentSkills.filter(sk =>
                    sk.name.toLowerCase().includes(keyword) ||
                    sk.key.toLowerCase().includes(keyword)
                );
                renderSkillList(filtered);
            }

            searchInput.addEventListener('input', filterSkills);
            renderSkillList(currentSkills);

            dialog.querySelector('#set-icon-btn').onclick = () => {
                const input = dialog.querySelector('#icon-id-input');
                const id = input.value.trim();
                if (id && /^\d+$/.test(id)) {
                    setNodeIcon(node, id);
                    node.isPassive = tempIsPassive;
                    if (tempBorderPath) setNodeBorderImage(node, tempBorderPath);
                    document.body.removeChild(dialog);
                } else {
                    alert('请输入有效的数字ID');
                }
            };

            dialog.querySelector('#clear-icon-btn').onclick = () => {
                dialog.querySelector('#icon-id-input').value = '';
                node.iconId = null;
                node.iconImg = null;
                if (node.skillKey && !node.branchSkill) {
                    loadSkillIcon(node.skillKey, (img) => {
                        node.iconImg = img;
                        redraw();
                    });
                }
                redraw();
                statusEl.innerText = '已清除图标';
                setTimeout(() => statusEl.innerText = '就绪', 1500);
            };

            dialog.querySelector('#dialog-ok').onclick = () => {
                node.isPassive = tempIsPassive;
                if (tempBorderPath) setNodeBorderImage(node, tempBorderPath);
                redraw();
                statusEl.innerText = `节点 #${node.id} 已更新${node.borderImage ? ' (带边框图片)' : ''}${node.isPassive ? ' [被动]' : ''}`;
                setTimeout(() => statusEl.innerText = '就绪', 1500);
                document.body.removeChild(dialog);
            };

            dialog.querySelector('#dialog-cancel').onclick = () => {
                node.isPassive = isPassive;
                redraw();
                document.body.removeChild(dialog);
            };

            dialog.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    document.body.removeChild(dialog);
                }
            });
        }

        // ---------- 绘制 ----------
        function drawLine(ctx, p1, p2) {
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            const length = Math.hypot(dx, dy);
            if (length < 1) return;
            const angle = Math.atan2(dy, dx);

            if (useTexture && lineTextureImg && textureLoaded) {
                const img = lineTextureImg;
                const targetHeight = lineWidth * 2.5;
                const scale = targetHeight / img.height;
                const tileWidth = img.width * scale;

                ctx.save();
                ctx.translate(p1.x, p1.y);
                ctx.rotate(angle);

                const count = Math.ceil(length / tileWidth);
                for (let i = 0; i < count; i++) {
                    const x = i * tileWidth;
                    const drawW = Math.min(tileWidth, length - x);
                    ctx.drawImage(img, 0, 0, img.width, img.height, x, -targetHeight/2, drawW, targetHeight);
                }
                ctx.restore();
            } else {
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.strokeStyle = lineColor;
                ctx.lineWidth = lineWidth;
                if (lineDash) ctx.setLineDash([10, 8]);
                else ctx.setLineDash([]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
            }
        }

        function render() {
            if (!ctx) return;
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0, 0, w, h);
            ctx.save();

            // ---- 0. 背景图片 ----
            if (bgImage) {
                if (nodes.length > 0) {
                    // 有节点：基于节点边界 + 边距
                    const xs = nodes.map(n => n.x);
                    const ys = nodes.map(n => n.y);
                    const minX = Math.min(...xs);
                    const maxX = Math.max(...xs);
                    const minY = Math.min(...ys);
                    const maxY = Math.max(...ys);

                    const marginInput = document.getElementById('bg-margin');
                    const margin = parseInt(marginInput.value) || 250;

                    const centerX = (minX + maxX) / 2;
                    const centerY = (minY + maxY) / 2;
                    const bgWidth = maxX - minX + 2 * margin;
                    const bgHeight = maxY - minY + 2 * margin;

                    if (bgWidth > 0 && bgHeight > 0) {
                        const left = centerX - bgWidth / 2;
                        const top = centerY - bgHeight / 2;

                        const p1 = transformPoint(left, top);
                        const p2 = transformPoint(left + bgWidth, top + bgHeight);
                        const screenWidth = p2.x - p1.x;
                        const screenHeight = p2.y - p1.y;

                        if (screenWidth > 0 && screenHeight > 0) {
                            ctx.drawImage(bgImage, p1.x, p1.y, screenWidth, screenHeight);
                        }
                    }
                } else {
                    // 无节点：居中显示，保持宽高比
                    const imgAspect = bgImage.width / bgImage.height;
                    const canvasAspect = w / h;
                    let drawW, drawH, offsetX, offsetY;
                    if (imgAspect > canvasAspect) {
                        drawW = w;
                        drawH = w / imgAspect;
                        offsetX = 0;
                        offsetY = (h - drawH) / 2;
                    } else {
                        drawH = h;
                        drawW = h * imgAspect;
                        offsetX = (w - drawW) / 2;
                        offsetY = 0;
                    }
                    ctx.drawImage(bgImage, offsetX, offsetY, drawW, drawH);
                }
            }

            // ---- 绘制连线 ----
            for (let edge of edges) {
                const fromNode = nodes.find(n => n.id === edge.fromNodeId);
                const toNode = nodes.find(n => n.id === edge.toNodeId);
                if (!fromNode || !toNode) continue;
                const p1 = transformPoint(fromNode.x, fromNode.y);
                const p2 = transformPoint(toNode.x, toNode.y);
                drawLine(ctx, p1, p2);
            }

            // ---- 绘制节点 ----
            for (let node of nodes) {
                const pos = transformPoint(node.x, node.y);
                const isSelected = selectedNodes.includes(node);
                const isBranch = node.branchSkill && node.branchId;
                const hasIcon = !isBranch && node.iconImg && node.iconImg.complete;
                const passiveScale = node.isPassive ? 0.65 : 1.0;

                const iconSize = 50 * view.zoom * passiveScale;
                const borderSize = iconSize * 1.6;

                // ---- 1. 边框图片 ----
                if (node.borderImg && node.borderImg.complete && node.borderImg.width > 0) {
                    ctx.drawImage(node.borderImg, pos.x - borderSize/2, pos.y - borderSize/2, borderSize, borderSize);
                }

                // ---- 2. 选中高亮 ----
                if (isSelected) {
                    ctx.beginPath();
                    const ringSize = (node.borderImg ? 40 : 36) * view.zoom * passiveScale;
                    ctx.arc(pos.x, pos.y, ringSize, 0, 2 * Math.PI);
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2.5;
                    ctx.setLineDash([5, 5]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // ---- 3. 分支节点边框标记 ----
                if (isBranch) {
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 30 * view.zoom * passiveScale, 0, 2 * Math.PI);
                    ctx.strokeStyle = '#66CCFF';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // ---- 4. 技能图标 ----
                if (hasIcon) {
                    const img = node.iconImg;
                    const aspect = img.width / img.height;
                    let drawW = iconSize;
                    let drawH = iconSize;
                    if (aspect > 1) {
                        drawH = iconSize / aspect;
                    } else {
                        drawW = iconSize * aspect;
                    }
                    const xOff = (iconSize - drawW) / 2;
                    const yOff = (iconSize - drawH) / 2;
                    ctx.drawImage(img,
                        pos.x - iconSize/2 + xOff,
                        pos.y - iconSize/2 + yOff,
                        drawW, drawH
                    );
                } else if (isBranch) {
                    ctx.font = `${Math.max(20, 26 * view.zoom * passiveScale)}px 'Segoe UI'`;
                    ctx.fillStyle = '#88CCFF';
                    const branchName = node.skillName ? node.skillName.split('→')[1]?.trim() : 'BR';
                    const short = branchName.slice(0, 2);
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(short, pos.x, pos.y);
                } else {
                    ctx.font = `${Math.max(24, 30 * view.zoom * passiveScale)}px 'Segoe UI'`;
                    ctx.fillStyle = '#fff';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(node.skillKey ? '⚡' : '?', pos.x, pos.y);
                }

                // ---- 5. 节点名称 ----
                if (view.zoom >= 0.5) {
                    ctx.font = `${Math.max(10, 12 * view.zoom * passiveScale)}px 'Segoe UI'`;
                    ctx.fillStyle = '#ddd';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    let displayName = node.skillName;
                    if (displayName.length > 15) displayName = displayName.slice(0, 12) + '...';
                    const nameY = node.borderImg ? pos.y - 42 * view.zoom * passiveScale - 6 : pos.y - 34 * view.zoom * passiveScale - 4;
                    ctx.fillText(displayName, pos.x, nameY);
                }
            }

            // ---- 连线模式高亮 ----
            if (currentMode === 'link' && linkSelectedNode) {
                const pos = transformPoint(linkSelectedNode.x, linkSelectedNode.y);
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 36 * view.zoom, 0, 2 * Math.PI);
                ctx.strokeStyle = '#ffaa66';
                ctx.lineWidth = 3;
                ctx.setLineDash([6, 8]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
            ctx.restore();
        }

        function redraw() {
            if (!canvas) return;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            render();
            document.getElementById('selection-count').textContent = `已选: ${selectedNodes.length}`;
        }

        // ---------- 交互 ----------
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
        }

        function onMouseDown(e) {
            e.preventDefault();
            const { x: screenX, y: screenY } = getCanvasCoords(e);
            const world = inverseTransform(screenX, screenY);

            let hitNode = null;
            for (let node of nodes) {
                const radius = (node.borderImg ? 40 : 32) * (node.isPassive ? 0.65 : 1.0);
                if (Math.hypot(world.x - node.x, world.y - node.y) < radius) {
                    hitNode = node;
                    break;
                }
            }

            if (currentMode === 'link') {
                if (hitNode) {
                    if (linkSelectedNode === null) {
                        linkSelectedNode = hitNode;
                        statusEl.innerText = `已选 ${hitNode.skillName}，点击另一节点连线`;
                        redraw();
                    } else {
                        if (linkSelectedNode !== hitNode) {
                            const exists = edges.some(e =>
                                (e.fromNodeId === linkSelectedNode.id && e.toNodeId === hitNode.id) ||
                                (e.fromNodeId === hitNode.id && e.toNodeId === linkSelectedNode.id)
                            );
                            if (!exists) {
                                edges.push({ fromNodeId: linkSelectedNode.id, toNodeId: hitNode.id });
                                statusEl.innerText = '已添加连线';
                            } else {
                                statusEl.innerText = '连线已存在';
                            }
                        }
                        linkSelectedNode = null;
                        redraw();
                    }
                } else {
                    linkSelectedNode = null;
                    redraw();
                }
                return;
            }

            if (hitNode) {
                if (ctrlPressed) {
                    const idx = selectedNodes.indexOf(hitNode);
                    if (idx >= 0) {
                        selectedNodes.splice(idx, 1);
                        statusEl.innerText = `取消选中: ${hitNode.skillName}`;
                    } else {
                        selectedNodes.push(hitNode);
                        statusEl.innerText = `添加选中: ${hitNode.skillName} (已选 ${selectedNodes.length} 个)`;
                    }
                    redraw();
                } else {
                    selectedNodes = [hitNode];
                    statusEl.innerText = `选中: ${hitNode.skillName}`;
                    redraw();
                }
                dragNode = hitNode;
                dragNodeOffset.x = world.x - hitNode.x;
                dragNodeOffset.y = world.y - hitNode.y;
                canvas.style.cursor = 'grabbing';
                return;
            } else {
                selectedNodes = [];
                redraw();
                statusEl.innerText = '已取消选择';
            }

            isDragging = true;
            dragStart.x = screenX;
            dragStart.y = screenY;
            canvas.style.cursor = 'grabbing';
        }

        function onMouseMove(e) {
            if (dragNode) {
                const { x: screenX, y: screenY } = getCanvasCoords(e);
                const world = inverseTransform(screenX, screenY);
                dragNode.x = world.x - dragNodeOffset.x;
                dragNode.y = world.y - dragNodeOffset.y;
                redraw();
                return;
            }
            if (isDragging) {
                const { x: screenX, y: screenY } = getCanvasCoords(e);
                const dx = screenX - dragStart.x, dy = screenY - dragStart.y;
                view.x += dx; view.y += dy;
                dragStart.x = screenX; dragStart.y = screenY;
                redraw();
            }
        }

        function onMouseUp() {
            dragNode = null;
            isDragging = false;
            canvas.style.cursor = 'grab';
        }

        function onWheel(e) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            let newZoom = view.zoom * delta;
            if (newZoom > 3) newZoom = 3;
            if (newZoom < 0.2) newZoom = 0.2;
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
            const worldX = (mouseX - view.x) / view.zoom;
            const worldY = (mouseY - view.y) / view.zoom;
            view.zoom = newZoom;
            view.x = mouseX - worldX * view.zoom;
            view.y = mouseY - worldY * view.zoom;
            redraw();
        }

        function onDoubleClick(e) {
            const { x: screenX, y: screenY } = getCanvasCoords(e);
            const world = inverseTransform(screenX, screenY);
            for (let node of nodes) {
                const radius = (node.borderImg ? 40 : 32) * (node.isPassive ? 0.65 : 1.0);
                if (Math.hypot(world.x - node.x, world.y - node.y) < radius) {
                    showSkillDialog(node);
                    break;
                }
            }
        }

        function onContextMenu(e) {
            e.preventDefault();
            const { x: screenX, y: screenY } = getCanvasCoords(e);
            const world = inverseTransform(screenX, screenY);
            for (let node of nodes) {
                const radius = (node.borderImg ? 40 : 32) * (node.isPassive ? 0.65 : 1.0);
                if (Math.hypot(world.x - node.x, world.y - node.y) < radius) {
                    if (confirm(`删除节点 "${node.skillName}" 及其所有连线？`)) {
                        deleteNodeById(node.id);
                    }
                    break;
                }
            }
        }

        function onKeyDown(e) {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (selectedNodes.length > 0) {
                    const ids = selectedNodes.map(n => n.id);
                    if (confirm(`删除 ${ids.length} 个选中节点及其所有连线？`)) {
                        nodes = nodes.filter(n => !ids.includes(n.id));
                        edges = edges.filter(e => !ids.includes(e.fromNodeId) && !ids.includes(e.toNodeId));
                        selectedNodes = [];
                        redraw();
                        statusEl.innerText = `已删除 ${ids.length} 个节点`;
                        setTimeout(() => statusEl.innerText = '就绪', 1500);
                    }
                } else if (selectedNodes.length === 1) {
                    const node = selectedNodes[0];
                    if (confirm(`删除节点 "${node.skillName}" 及其所有连线？`)) {
                        deleteNodeById(node.id);
                    }
                }
                e.preventDefault();
            }
            if (e.key === 'Control' || e.key === 'Meta') {
                ctrlPressed = true;
            }
        }

        function onKeyUp(e) {
            if (e.key === 'Control' || e.key === 'Meta') {
                ctrlPressed = false;
            }
        }

        // ---------- 批量操作 ----------
        function batchSetBorder() {
            if (selectedNodes.length === 0) {
                alert('请先选中一个或多个节点（Ctrl+左键多选）');
                return;
            }
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const relativePath = `images/icons/${file.name}`;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        for (let node of selectedNodes) {
                            setNodeBorderImage(node, relativePath);
                        }
                        redraw();
                        statusEl.innerText = `已为 ${selectedNodes.length} 个节点设置边框图片: ${relativePath}`;
                        setTimeout(() => statusEl.innerText = '就绪', 2000);
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };
            fileInput.click();
        }

        function batchClearBorder() {
            if (selectedNodes.length === 0) {
                alert('请先选中一个或多个节点');
                return;
            }
            if (confirm(`清除 ${selectedNodes.length} 个节点的边框图片？`)) {
                for (let node of selectedNodes) {
                    setNodeBorderImage(node, null);
                }
                redraw();
                statusEl.innerText = `已清除 ${selectedNodes.length} 个节点的边框`;
                setTimeout(() => statusEl.innerText = '就绪', 1500);
            }
        }

        // ---------- 保存/加载 ----------
        function saveLayout() {
            if (nodes.length === 0) {
                alert('没有节点可保存');
                return;
            }
            const xs = nodes.map(n => n.x);
            const ys = nodes.map(n => n.y);
            const minX = Math.min(...xs);
            const maxX = Math.max(...xs);
            const minY = Math.min(...ys);
            const maxY = Math.max(...ys);
            const centerX = (minX + maxX) / 2;
            const centerY = (minY + maxY) / 2;

            const marginInput = document.getElementById('bg-margin');
            const backgroundMargin = parseInt(marginInput.value) || 250;

            const layout = {
                version: '2.8',
                bounds: {
                    minX: minX,
                    maxX: maxX,
                    minY: minY,
                    maxY: maxY
                },
                offsetX: centerX,
                offsetY: centerY,
                backgroundMargin: backgroundMargin,
                backgroundImagePath: bgImagePath || null,  // 存背景图路径
                nodes: nodes.map(n => ({
                    id: n.id,
                    skillKey: n.skillKey,
                    skillName: n.skillName,
                    x: n.x - centerX,
                    y: n.y - centerY,
                    branchSkill: n.branchSkill || null,
                    branchId: n.branchId || null,
                    iconId: n.iconId || null,
                    borderImage: n.borderImage || null,
                    isPassive: n.isPassive || false
                })),
                edges: edges.map(e => ({ fromNodeId: e.fromNodeId, toNodeId: e.toNodeId }))
            };

            const dataStr = JSON.stringify(layout, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'skilltree_layout.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            const borderCount = nodes.filter(n => n.borderImage).length;
            const passiveCount = nodes.filter(n => n.isPassive).length;
            statusEl.innerText = `已保存 ${nodes.length} 个节点（${borderCount} 带边框，${passiveCount} 被动），${edges.length} 条连线${bgImagePath ? '，背景: ' + bgImagePath : ''}`;
        }

        function loadLayoutFromFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const layout = JSON.parse(e.target.result);
                    let loadedNodes = layout.nodes || [];
                    if (layout.offsetX !== undefined && layout.offsetY !== undefined) {
                        loadedNodes = loadedNodes.map(n => ({
                            ...n,
                            x: n.x + layout.offsetX,
                            y: n.y + layout.offsetY
                        }));
                    }
                    nodes = loadedNodes.map(n => {
                        const node = {
                            id: n.id,
                            skillKey: n.skillKey,
                            skillName: n.skillName || (n.skillKey ? (skillsMap.get(n.skillKey)?.name || '未指定') : '未指定'),
                            x: n.x,
                            y: n.y,
                            iconImg: null,
                            iconId: n.iconId || null,
                            branchSkill: n.branchSkill || null,
                            branchId: n.branchId || null,
                            borderImage: n.borderImage || null,
                            borderImg: null,
                            isPassive: n.isPassive || false
                        };
                        if (node.borderImage) {
                            loadBorderImage(node.borderImage, (img) => {
                                node.borderImg = img;
                                redraw();
                            });
                        }
                        if (node.iconId) {
                            loadIconById(node.iconId, (img) => {
                                node.iconImg = img;
                                redraw();
                            });
                        } else if (node.skillKey && !node.branchSkill) {
                            loadSkillIcon(node.skillKey, (img) => {
                                node.iconImg = img;
                                redraw();
                            });
                        }
                        return node;
                    });
                    edges = (layout.edges || []).map(e => ({
                        fromNodeId: e.fromNodeId,
                        toNodeId: e.toNodeId
                    }));

                    // ---- 加载背景图路径 ----
                    if (layout.backgroundImagePath) {
                        const img = new Image();
                        img.onload = () => {
                            bgImage = img;
                            bgImagePath = layout.backgroundImagePath;
                            statusEl.innerText = `背景已加载: ${bgImagePath}`;
                            redraw();
                            setTimeout(() => statusEl.innerText = '就绪', 2000);
                        };
                        img.onerror = () => {
                            bgImage = null;
                            bgImagePath = null;
                            statusEl.innerText = `⚠️ 背景图片不存在: ${layout.backgroundImagePath}，使用默认背景`;
                            loadDefaultBackground();
                            redraw();
                            setTimeout(() => statusEl.innerText = '就绪', 2000);
                        };
                        img.src = layout.backgroundImagePath;
                    } else {
                        loadDefaultBackground();
                    }

                    let maxId = 100;
                    nodes.forEach(n => { if (n.id >= maxId) maxId = n.id + 1; });
                    nextId = maxId;
                    selectedNodes = [];
                    redraw();
                    const borderCount = nodes.filter(n => n.borderImage).length;
                    const passiveCount = nodes.filter(n => n.isPassive).length;
                    statusEl.innerText = `已加载 ${nodes.length} 个节点（${borderCount} 带边框，${passiveCount} 被动），${edges.length} 条连线${bgImagePath ? '，背景: ' + bgImagePath : ''}`;
                } catch(err) { alert('加载失败: '+err.message); }
            };
            reader.readAsText(file);
        }

        function resetNodesPosition() {
            const startX = -300, startY = -200;
            const stepX = 150, stepY = 120;
            for (let i = 0; i < nodes.length; i++) {
                nodes[i].x = startX + (i % 6) * stepX;
                nodes[i].y = startY + Math.floor(i / 6) * stepY;
            }
            redraw();
            statusEl.innerText = '节点已重新排列';
            setTimeout(() => statusEl.innerText = '就绪', 1500);
        }

        function loadSkillJson(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const skills = JSON.parse(e.target.result);
                    skillsMap.clear();
                    allSkillsList = [];
                    if (Array.isArray(skills)) {
                        for (let sk of skills) {
                            skillsMap.set(sk.key, sk);
                            allSkillsList.push(sk);
                        }
                    } else {
                        for (let key in skills) {
                            if (Array.isArray(skills[key])) {
                                for (let sk of skills[key]) {
                                    if (sk.key) {
                                        skillsMap.set(sk.key, sk);
                                        allSkillsList.push(sk);
                                    }
                                }
                            }
                        }
                    }
                    statusEl.innerText = `已加载 ${skillsMap.size} 个技能`;
                } catch(err) { alert('skill.json 解析失败'); }
            };
            reader.readAsText(file);
        }

        // ---------- 视图 ----------
        function zoomIn() {
            view.zoom = Math.min(3, view.zoom * 1.2);
            redraw();
        }
        function zoomOut() {
            view.zoom = Math.max(0.2, view.zoom / 1.2);
            redraw();
        }
        function resetView() {
            if (!nodes.length) return;
            const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
            const minX = Math.min(...xs), maxX = Math.max(...xs);
            const minY = Math.min(...ys), maxY = Math.max(...ys);
            const width = maxX - minX, height = maxY - minY;
            const padding = 100;
            const targetW = canvas.width - padding * 2;
            const targetH = canvas.height - padding * 2;
            let zoom = Math.min(targetW / width, targetH / height, 1.2);
            if (zoom < 0.1) zoom = 0.1;
            view.zoom = zoom;
            const centerX = (minX + maxX) / 2, centerY = (minY + maxY) / 2;
            view.x = canvas.width / 2 - centerX * zoom;
            view.y = canvas.height / 2 - centerY * zoom;
            redraw();
        }

        // ---------- UI绑定 ----------
        function bindUI() {
            document.getElementById('btn-add-token').addEventListener('click', addTokenAtCenter);
            document.getElementById('btn-pan').addEventListener('click', () => {
                currentMode = 'pan';
                linkSelectedNode = null;
                document.getElementById('btn-pan').classList.add('active');
                document.getElementById('btn-link').classList.remove('active');
            });
            document.getElementById('btn-link').addEventListener('click', () => {
                currentMode = 'link';
                linkSelectedNode = null;
                document.getElementById('btn-link').classList.add('active');
                document.getElementById('btn-pan').classList.remove('active');
            });
            document.getElementById('btn-zoom-in').addEventListener('click', zoomIn);
            document.getElementById('btn-zoom-out').addEventListener('click', zoomOut);
            document.getElementById('btn-clear-edges').addEventListener('click', () => { edges = []; redraw(); });
            document.getElementById('btn-reset-nodes').addEventListener('click', resetNodesPosition);
            document.getElementById('btn-save').addEventListener('click', saveLayout);
            document.getElementById('btn-reset-view').addEventListener('click', resetView);
            document.getElementById('load-skills-label').onclick = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'application/json';
                input.onchange = (e) => loadSkillJson(e.target.files[0]);
                input.click();
            };
            document.getElementById('load-layout-label').onclick = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'application/json';
                input.onchange = (e) => loadLayoutFromFile(e.target.files[0]);
                input.click();
            };

            document.getElementById('btn-import-bg').addEventListener('click', importBackground);
            document.getElementById('btn-clear-bg').addEventListener('click', clearBackground);

            document.getElementById('btn-batch-passive').addEventListener('click', () => batchSetPassive(true));
            document.getElementById('btn-batch-active').addEventListener('click', () => batchSetPassive(false));

            document.getElementById('line-color').addEventListener('input', (e) => { lineColor = e.target.value; redraw(); });
            document.getElementById('line-width').addEventListener('input', (e) => { lineWidth = parseInt(e.target.value); redraw(); });
            document.getElementById('toggle-dash').addEventListener('click', () => {
                lineDash = !lineDash;
                document.getElementById('toggle-dash').innerText = lineDash ? '✔️ 开启' : '◻️ 关闭';
                redraw();
            });
            document.getElementById('toggle-texture').addEventListener('click', () => {
                useTexture = !useTexture;
                document.getElementById('toggle-texture').innerText = useTexture ? '✔️ 开启' : '◻️ 关闭';
                redraw();
            });

            document.getElementById('btn-batch-border').addEventListener('click', batchSetBorder);
            document.getElementById('btn-clear-batch-border').addEventListener('click', batchClearBorder);

            document.getElementById('btn-pan').classList.add('active');
            statusEl.innerText = '就绪';
        }

        // ---------- 启动 ----------
        function init() {
            function resizeCanvas() {
                canvas.width = container.clientWidth;
                canvas.height = container.clientHeight;
                redraw();
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            canvas.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('wheel', onWheel, { passive: false });
            canvas.addEventListener('dblclick', onDoubleClick);
            canvas.addEventListener('contextmenu', onContextMenu);
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            canvas.style.cursor = 'grab';

            bindUI();
            loadDefaultTexture();
            loadDefaultBackground();
            redraw();
        }

        init();
    })();
</script>
</body>
</html>
